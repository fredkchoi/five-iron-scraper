name: Midnight Booker

on:
  # Primary trigger: a Cloudflare Worker fires `repository_dispatch` at 03:00 UTC
  # (CF crons are more reliable than GitHub Actions schedules, which drop/delay).
  repository_dispatch:
    types: [midnight-booker]
  # Backup trigger in case the CF Worker fails — same 03:00 UTC slot, 60min buffer.
  # Remove once the Worker is proven reliable.
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Attempt midnight booking
        run: python scheduler.py
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          LOCATION_ID: ${{ secrets.LOCATION_ID }}
          PARTY_SIZE: ${{ secrets.PARTY_SIZE }}
          FIVE_IRON_EMAIL: ${{ secrets.FIVE_IRON_EMAIL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_EVENT_COLOR: ${{ secrets.GOOGLE_EVENT_COLOR }}
      - name: Commit updated targets.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add targets.json
          git diff --staged --quiet || git commit -m "chore: update targets after booking attempt" && git push
