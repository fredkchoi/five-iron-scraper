name: Validate targets.json

on:
  push:
    paths:
      - targets.json
  pull_request:
    paths:
      - targets.json
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate targets.json
        run: python validate_targets.py
