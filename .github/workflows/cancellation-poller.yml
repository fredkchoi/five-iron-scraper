name: Cancellation Poller

on:
  schedule:
    - cron: '0 * * * *'  # Every hour — only does work if there are polling targets
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Check for cancellations
        run: python cancellation_poller.py
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          LOCATION_ID: ${{ secrets.LOCATION_ID }}
          PARTY_SIZE: ${{ secrets.PARTY_SIZE }}
          FIVE_IRON_EMAIL: ${{ secrets.FIVE_IRON_EMAIL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_EVENT_COLOR: ${{ secrets.GOOGLE_EVENT_COLOR }}
      - name: Commit updated targets.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add targets.json
          git diff --staged --quiet || (git commit -m "chore: update targets after cancellation poll" && git push)
